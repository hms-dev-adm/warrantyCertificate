<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보증서 자동 생성</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Serif KR', serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #faf8f5;
        }

        .hub {
            text-align: center;
            padding: 40px;
        }

        .hub h1 {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 4px;
            margin-bottom: 40px;
            color: #333;
        }

        .brand-links {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .brand-link {
            display: block;
            width: 200px;
            padding: 40px 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-decoration: none;
            color: #2B2B2B;
            background-color: #fff;
            transition: box-shadow 0.2s, transform 0.2s;
        }

        .brand-link:hover {
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
        }

        .brand-link .brand-name {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .brand-link .brand-desc {
            margin-top: 10px;
            font-size: 12px;
            color: #888;
        }

        #poco-primo {
            border-color: #D2B971;
        }

        #poco-primo .brand-name {
            color: #2B2B2B;
        }

        #poco-primo:hover {
            box-shadow: 0 4px 14px rgba(210, 185, 113, 0.35);
        }
    </style>
</head>

<body>
    <div class="hub">
        <h1>보증서 자동 생성</h1>
        <div class="brand-links">
            <a class="brand-link" id="gongbang301" href="/gongbang301">
                <div class="brand-name">공방301</div>
                <div class="brand-desc">GONGBANG 301</div>
            </a>
            <a class="brand-link" id="poco-primo" href="/poco-primo">
                <div class="brand-name">POCO PRIMO</div>
                <div class="brand-desc">POCO PRIMO</div>
            </a>
        </div>
    </div>
</body>

</html>
