<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보증서 자동 생성</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">

    <style>
        body {
            font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #faf8f5;
        }

        .hub {
            text-align: center;
            padding: 40px;
        }

        .hub h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 4px;
            margin-bottom: 40px;
            color: #333;
        }

        .brand-links {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .brand-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .brand-link {
            display: block;
            width: 260px;
            height: 160px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #fff;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: box-shadow 0.2s, transform 0.2s;
        }

        .brand-link:hover {
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
        }

        .brand-label {
            margin-top: 16px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #2B2B2B;
            text-align: center;
        }

        #gongbang301 {
            background-image: url('Img/root_logo_gb.jpg');
        }

        #poco-primo {
            border-color: #D2B971;
            background-image: url('Img/root_logo_poco.png');
        }

        #poco-primo:hover {
            box-shadow: 0 4px 14px rgba(210, 185, 113, 0.35);
        }
    </style>
</head>

<body>
    <div class="hub">
        <h1>보증서 자동 생성</h1>
        <div class="brand-links">
            <div class="brand-item">
                <a class="brand-link" id="gongbang301" href="/gongbang301" aria-label="GONGBANG 301"></a>
                <div class="brand-label">GONGBANG 301</div>
            </div>
            <div class="brand-item">
                <a class="brand-link" id="poco-primo" href="/poco-primo" aria-label="POCO PRIMO"></a>
                <div class="brand-label">POCO PRIMO</div>
            </div>
        </div>
    </div>
</body>

</html>
