<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POCO PRIMO 보증서 일괄처리</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Noto+Sans+KR:wght@400;500&family=Noto+Serif:wght@400;500;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --dusty-blue: #B7C3D3;
            --warm-beige: #E3DAC8;
            --soft-stone: #DDD9D4;
            --antique-gold: #D2B971;
            --charcoal: #2B2B2B;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #faf8f5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            background-color: #fff;
        }

        .controls {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f5f5f5;
            border-radius: 5px;
        }

        #jsonInput {
            width: 100%;
            height: 150px;
            margin-bottom: 10px;
            padding: 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
        }

        button {
            padding: 8px 15px;
            background-color: var(--charcoal);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        button:hover {
            background-color: #444;
        }

        #printBtn {
            background-color: var(--dusty-blue);
            color: var(--charcoal);
        }

        #printBtn:hover {
            background-color: #a3b2c6;
        }

        #loadFileBtn {
            background-color: var(--antique-gold);
            color: var(--charcoal);
        }

        #loadFileBtn:hover {
            background-color: #c2a75f;
        }

        /* 인증서 카드 */
        .certificate {
            width: 127mm;
            height: 178mm;
            margin: 20px auto;
            padding: 6mm;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
            page-break-after: always;
        }

        .cert-inner {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            padding: 10mm 8mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            color: var(--charcoal);
        }

        .cert-title {
            flex-shrink: 0;
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 6px;
            margin-top: 2mm;
        }

        .cert-subtitle {
            flex-shrink: 0;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 4mm;
            line-height: 1.5;
            color: var(--charcoal);
        }

        .cert-emblem {
            flex-shrink: 0;
            width: 40px;
            height: 71px;
            margin: 5mm 0;
            background-image: url('Img/poco_certi_logo.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
        }

        .cert-divider {
            flex-shrink: 0;
            width: 60%;
            display: flex;
            align-items: center;
            margin: 3mm 0;
        }

        .cert-divider::before,
        .cert-divider::after {
            content: '';
            flex: 1;
            border-top: 1px solid var(--soft-stone);
        }

        .cert-divider span {
            padding: 0 12px;
            color: #8a8a8a;
            font-size: 15px;
            line-height: 1;
        }

        .cert-heading {
            flex-shrink: 0;
            font-family: 'Cormorant Garamond', serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 4px;
            margin-bottom: 6mm;
        }

        .cert-fields {
            width: 100%;
            text-align: left;
            margin-top: auto;
            /* margin-bottom: 6mm; */
        }

        .cert-field {
            display: flex;
            align-items: flex-end;
            /* gap: 20px; */
            margin-bottom: 3mm;
        }

        .cert-field:last-child {
            margin-bottom: 0;
        }

        .cert-field-label {
            flex: 0 0 42%;
        }

        .cert-field .label-en {
            font-family: 'Noto Serif', serif;
            font-size: 17px;
            font-weight: 400;
            line-height: 1.1;
            color: var(--charcoal);
        }

        .cert-field .label-kr {
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 500;
            font-size: 9px;
            color: #9a9a9a;
            margin-top: 3px;
        }

        .cert-field-value {
            flex: 1;
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 500;
            min-height: 13px;
            font-size: 11px;
            color: var(--charcoal);
            border-bottom: 1px solid #d9d9d9;
            padding-bottom: 4px;
            TEXT-ALIGN: center;
        }

        .no-certificate {
            text-align: center;
            padding: 40px;
            color: #666;
            background-color: #f9f9f9;
            border-radius: 8px;
            margin: 20px 0;
        }

        @media print {
            .controls {
                display: none;
            }

            body,
            html {
                margin: 0;
                padding: 0;
            }

            body * {
                visibility: hidden;
            }

            #certificateContainer,
            #certificateContainer * {
                visibility: visible;
            }

            #certificateContainer {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
            }

            .certificate {
                box-shadow: none;
                margin: 0 auto;
            }

            .no-certificate {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="controls">
            <h2>POCO PRIMO 보증서 일괄처리</h2>
            <p>아래에 JSON 데이터를 입력하세요.</p>

            <textarea id="jsonInput" placeholder="JSON 데이터를 입력하세요."></textarea>

            <div>
                <input type="file" id="fileInput" accept=".json" style="display:none;">
                <button id="loadFileBtn">JSON 파일 불러오기</button>
                <button id="batchProcessBtn">일괄 처리</button>
                <button id="printBtn">인쇄하기</button>
            </div>
        </div>

        <div id="certificateContainer">
            <div class="no-certificate">
                <p>JSON 데이터를 입력하고 '일괄 처리' 버튼을 클릭하여 보증서를 생성하세요.</p>
            </div>
        </div>
    </div>

    <script>
        // 보증서 DOM 생성
        function generateCertificateHTML(item) {
            const productName = item.modelNo || item.modelName || item.productName || '';
            const material = item.material || '';
            const weight = item.gram ? item.gram + 'g' : (item.weight || '');
            const size = item.size || '';
            const purchaseDate = item.orderDate || item.purchaseDate || '';

            return `
                <div class="certificate">
                    <div class="cert-inner">
                        <div class="cert-title">POCO PRIMO</div>
                        <div class="cert-subtitle">A little compass in gold,<br>guiding your first journey</div>

                        <div class="cert-emblem"></div>

                        <div class="cert-divider"><span>✦</span></div>
                        <div class="cert-heading">WARRANTY CERTIFICATE</div>

                        <div class="cert-fields">
                            <div class="cert-field">
                                <div class="cert-field-label">
                                    <div class="label-en">Product Name</div>
                                    <div class="label-kr">제품명</div>
                                </div>
                                <div class="cert-field-value">${productName}</div>
                            </div>
                            <div class="cert-field">
                                <div class="cert-field-label">
                                    <div class="label-en">Material</div>
                                    <div class="label-kr">소재</div>
                                </div>
                                <div class="cert-field-value">${material}</div>
                            </div>
                            <div class="cert-field">
                                <div class="cert-field-label">
                                    <div class="label-en">Weight</div>
                                    <div class="label-kr">중량</div>
                                </div>
                                <div class="cert-field-value">${weight}</div>
                            </div>
                            <div class="cert-field">
                                <div class="cert-field-label">
                                    <div class="label-en">Size</div>
                                    <div class="label-kr">사이즈</div>
                                </div>
                                <div class="cert-field-value">${size}</div>
                            </div>
                            <div class="cert-field">
                                <div class="cert-field-label">
                                    <div class="label-en">Date of Purchase</div>
                                    <div class="label-kr">구매일</div>
                                </div>
                                <div class="cert-field-value">${purchaseDate}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        document.addEventListener('DOMContentLoaded', function () {
            const jsonInput = document.getElementById('jsonInput');
            const fileInput = document.getElementById('fileInput');
            const loadFileBtn = document.getElementById('loadFileBtn');

            const batchProcessBtn = document.getElementById('batchProcessBtn');
            const certificateContainer = document.getElementById('certificateContainer');
            const printBtn = document.getElementById('printBtn');

            // JSON 파일 업로드
            loadFileBtn.addEventListener('click', function () {
                fileInput.click();
            });

            fileInput.addEventListener('change', function (event) {
                const file = event.target.files[0];
                if (!file) return;

                if (!file.name.endsWith('.json')) {
                    alert('JSON 파일(.json)만 업로드 가능합니다.');
                    return;
                }

                const reader = new FileReader();

                reader.onload = function (e) {
                    try {
                        const fileContent = e.target.result;
                        JSON.parse(fileContent);
                        jsonInput.value = fileContent;
                        alert('JSON 파일을 성공적으로 불러왔습니다.');
                    } catch (error) {
                        alert('유효한 JSON 파일이 아닙니다: ' + error.message);
                    }
                };

                reader.onerror = function () {
                    alert('파일을 읽는 중 오류가 발생했습니다.');
                };

                reader.readAsText(file);
            });

            // 인쇄하기
            printBtn.addEventListener('click', function () {
                window.print();
            });

            // 어떤 JSON 구조든 제품(item) 객체 목록으로 평탄화
            // 지원: 배열 [ {...} ], 고객키 객체 { "홍길동": [ {...} ] }, 단일 객체 { ... }
            function flattenItems(data) {
                const items = [];

                function collect(node) {
                    if (Array.isArray(node)) {
                        node.forEach(collect);
                    } else if (node && typeof node === 'object') {
                        // 제품 필드가 하나라도 있으면 item으로 간주
                        const isItem = ['modelNo', 'modelName', 'productName', 'material', 'gram', 'weight', 'size', 'orderDate', 'purchaseDate']
                            .some(key => node[key] !== undefined);
                        if (isItem) {
                            items.push(node);
                        } else {
                            // 고객키 객체 등: 값들을 재귀적으로 탐색
                            Object.values(node).forEach(collect);
                        }
                    }
                }

                collect(data);
                return items;
            }

            // 일괄 처리
            batchProcessBtn.addEventListener('click', function () {
                try {
                    const jsonData = JSON.parse(jsonInput.value);
                    const items = flattenItems(jsonData);

                    if (items.length === 0) {
                        throw new Error("보증서로 만들 제품 데이터를 찾지 못했습니다. (제품명/소재/중량/사이즈/구매일 필드 확인)");
                    }

                    certificateContainer.innerHTML = items
                        .map(item => generateCertificateHTML(item))
                        .join('');
                }
                catch (error) {
                    alert('JSON 데이터 형식이 올바르지 않습니다: ' + error.message);
                    certificateContainer.innerHTML = `
                        <div class="no-certificate">
                            <p>JSON 데이터 형식이 올바르지 않습니다.</p>
                            <p>오류: ${error.message}</p>
                        </div>
                    `;
                }
            });
        });
    </script>
</body>

</html>
